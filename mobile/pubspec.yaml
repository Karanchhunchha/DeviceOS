name: deviceos_companion
description: "A production-grade BLE & Wi-Fi provisioning and real-time telemetry companion app for DeviceOS."
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.31.0
  flutter_ble_peripheral: ^2.1.1
  web_socket_channel: ^3.0.1
  http: ^1.2.1
  provider: ^6.1.2
  cupertino_icons: ^1.0.6
  permission_handler: ^12.0.3
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.7.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
